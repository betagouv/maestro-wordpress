php_admin_flag[log_errors] = on
php_flag[display_errors] = off
clear_env = no

; PM settings for optimal performance
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Timeout settings
request_terminate_timeout = 120
request_slowlog_timeout = 30

